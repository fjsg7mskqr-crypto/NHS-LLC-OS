services:
  - type: worker
    name: nhs-discord-bot
    runtime: node
    rootDir: services/discord-bot
    buildCommand: npm install
    startCommand: npm run start
    plan: starter
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: DISCORD_USER_ID
        sync: false
      - key: ASSISTANT_BASE_URL
        sync: false
      - key: ASSISTANT_SERVICE_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
